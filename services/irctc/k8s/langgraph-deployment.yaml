apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-brain
  namespace: train-ticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langgraph-brain
  template:
    metadata:
      labels:
        app: langgraph-brain
    spec:
      containers:
      - name: langgraph-brain
        image: langgraph-brain:latest
        imagePullPolicy: Never
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
        env:
        - name: EVENT_BUS_URL
          value: "nats://nats-service:4222"
        - name: PROMETHEUS_URL
          value: "http://prometheus-service:9090"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: watcher-secrets
              key: gemini-api-key
              optional: true
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: watcher-secrets
              key: github-token
              optional: true
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 320Mi
---
apiVersion: v1
kind: Service
metadata:
  name: langgraph-service
  namespace: train-ticket
spec:
  selector:
    app: langgraph-brain
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
