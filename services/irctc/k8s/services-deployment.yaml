## K8s Deployments + Services for all microservices
## Generated for k3d local cluster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: train-ticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: irctc-user-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger-service:4318"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_LOGS_EXPORTER
          value: "none"
        - name: CHAOS_LATENCY_MAX_MS
          value: "0"
        - name: CHAOS_ERROR_RATE
          value: "0.0"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 3
          timeoutSeconds: 2
          failureThreshold: 2
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 2
          timeoutSeconds: 1
          failureThreshold: 1
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 320Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: train-ticket
spec:
  selector:
    app: user-service
  ports:
  - port: 8000
    targetPort: 8000
---
