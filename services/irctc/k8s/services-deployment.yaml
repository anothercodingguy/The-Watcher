## Monitoring: Jaeger
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: train-ticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        ports:
        - containerPort: 16686
        - containerPort: 4318
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-service
  namespace: train-ticket
spec:
  selector:
    app: jaeger
  ports:
  - name: ui
    port: 16686
    targetPort: 16686
  - name: otlp
    port: 4318
    targetPort: 4318
---
## Monitoring: Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: train-ticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.retention.time=3d"
        - "--web.enable-remote-write-receiver"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: train-ticket
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
---
## Monitoring: Loki
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: train-ticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:3.0.0
        args:
        - "-config.file=/etc/loki/local-config.yaml"
        ports:
        - containerPort: 3100
        volumeMounts:
        - name: config
          mountPath: /etc/loki/local-config.yaml
          subPath: loki-config.yml
      volumes:
      - name: config
        configMap:
          name: loki-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki-service
  namespace: train-ticket
spec:
  selector:
    app: loki
  ports:
  - port: 3100
    targetPort: 3100
---
## ── Prometheus Pushgateway ───────────────────────────────────────────────
## Receives ML anomaly scores from edge-remedy and exposes them
## for Prometheus to scrape. KEDA reads these metrics for scaling decisions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: train-ticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
      labels:
        app: pushgateway
    spec:
      containers:
      - name: pushgateway
        image: prom/pushgateway:v1.9.0
        ports:
        - containerPort: 9091
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway-service
  namespace: train-ticket
spec:
  selector:
    app: pushgateway
  ports:
  - port: 9091
    targetPort: 9091
