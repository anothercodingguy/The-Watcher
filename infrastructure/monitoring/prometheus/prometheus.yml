    static_configs:
      - targets: ["train-service:8000"]

  - job_name: "schedule-service"
    static_configs:
      - targets: ["schedule-service:8000"]

  - job_name: "ticket-service"
    static_configs:
      - targets: ["ticket-service:8000"]

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:8000"]

  - job_name: "payment-service"
    static_configs:
