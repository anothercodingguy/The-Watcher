server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containers
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            module: module
            funcName: funcName
      - labels:
          level:
          module:
      - template:
          source: service_name
          template: "{{ .container_name }}"
      - labels:
          service_name:
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.999999999Z"
          fallback_formats:
            - "2006-01-02T15:04:05Z"
