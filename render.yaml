# The Watcher - Render Blueprint (Free Tier)
# Deploy: Connect repo to Render → New Blueprint Instance → Select this repo
#
# All services use Render's free web service tier (no credit card required).
# Services spin down after 15min of inactivity and cold-start in ~60s.
#
# After first deploy, update the gateway's SERVICE_URL env vars and
# NEXT_PUBLIC_API_URL with the actual Render URLs from your dashboard.
#
# Not deployed (require paid tier or K8s):
#   - Jaeger, Prometheus, Loki (observability infra)
#   - edge-remedy (needs K8s API)
#   - promtail (needs Docker socket)

services:
  # ─── Microservices ──────────────────────────────────────────────────────────

  - type: web
    name: watcher-user-service
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/render/Dockerfile.user-service
    dockerContext: ./services/irctc/services
    envVars:
      - key: OTEL_TRACES_EXPORTER
        value: none
      - key: OTEL_METRICS_EXPORTER
        value: none
      - key: OTEL_LOGS_EXPORTER
        value: none
      - key: CHAOS_LATENCY_MAX_MS
        value: "0"
      - key: CHAOS_ERROR_RATE
        value: "0.0"

  - type: web
    name: watcher-auth-service
